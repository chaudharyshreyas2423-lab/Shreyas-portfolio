<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genomics Research | Shreyas Chaudhary</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div class="logo">GENOME<span>.IO</span></div>
            <ul>
                <li class="active">Dashboard</li>
                <li>Sequencing</li>
                <li>Analysis</li>
                <li>Archive</li>
            </ul>
        </nav>
        
        <main class="content">
            <header>
                <h1>Genomic Data Explorer</h1>
                <p>Manav Rachna International Institute of Research and Studies</p>
            </header>

            <section class="hero-card">
                <div class="card-info">
                    <h2>Current Research: DNA Synthesis</h2>
                    <p>Analyzing nucleotide patterns for predictive modeling.</p>
                    <button id="action-btn">Initialize Sequence</button>
                </div>
                <div id="visualizer" class="visualizer"></div>
            </section>

            <div class="stats-grid">
                <div class="stat-box"><h3>98.2%</h3><p>Accuracy</p></div>
                <div class="stat-box"><h3>12.4TB</h3><p>Data Processed</p></div>
                <div class="stat-box"><h3>Active</h3><p>Status</p></div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
